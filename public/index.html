<style>
  :root {
    --primary: #56ab91; --secondary: #047857; --success: #10b981; --warning: #f59e0b;
    --danger: #ef4444; --info: #3b82f6; --muted: #94a3b8; --bg: #0f172a;
    --card: #1e293b; --border: #334155; --text: #f8fafc; --text-muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LOGIN */
  .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
  .login-logo { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; color: #fff; margin: 0 auto 16px; }
  .login-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .login-sub { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 24px; }
  .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
  .login-input:focus { border-color: var(--primary); }
  .login-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #fff; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-weight: 700; font-size: 18px; }
  .header-sub { color: var(--text-muted); font-size: 12px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-badge { background: rgba(16,185,129,0.13); color: var(--success); padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
  .refresh-btn { background: none; border: 1px solid var(--border); color: var(--primary); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: rgba(86,171,145,0.1); }

  .tabs { display: flex; gap: 0; padding: 0 32px; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { background: none; border: none; color: var(--text-muted); padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
